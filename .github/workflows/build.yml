name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Build
        run: dotnet build PowerTray.sln -c Debug
      - name: Test
        run: dotnet run --project PowerTray.Tests\PowerTray.Tests.csproj
      - name: Vulnerability audit
        run: dotnet list PowerTray.sln package --vulnerable --include-transitive
