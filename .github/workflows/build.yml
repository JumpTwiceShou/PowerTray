name: Build

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2022
    env:
      CI: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: 8.0.422
          cache: true
          cache-dependency-path: "**/packages.lock.json"
      - name: Verify native dependency
        shell: pwsh
        run: ./LGSTrayHID/libhidapi/verify-hidapi.ps1
      - name: Restore locked dependencies
        run: dotnet restore PowerTray.sln --locked-mode
      - name: Build Debug
        run: dotnet build PowerTray.sln -c Debug --no-restore
      - name: Build Release
        run: dotnet build PowerTray.sln -c Release --no-restore
      - name: Test
        run: dotnet run --project PowerTray.Tests\PowerTray.Tests.csproj -c Release --no-restore
      - name: Vulnerability audit
        run: dotnet list PowerTray.sln package --vulnerable --include-transitive
      - name: Deprecated package audit
        run: dotnet list PowerTray.sln package --deprecated --include-transitive
