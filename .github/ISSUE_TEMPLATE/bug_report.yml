name: Bug report
description: Report a PowerTray problem or unsupported Logitech device
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: PowerTray version
      placeholder: "1.3.0"
    validations:
      required: true
  - type: textarea
    id: device
    attributes:
      label: Logitech device and receiver
      description: Include the exact device model and receiver/dongle if known.
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: Attach the diagnostics zip from Settings > Diagnostics > Export diagnostics when reporting device support or discovery issues.
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start PowerTray
        2. Reconnect the receiver
        3. Click Rescan devices
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
